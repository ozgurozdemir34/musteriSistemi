<mat-card>

  <h2>İletişim Kayıtları</h2>

  <p *ngIf="loading" style="margin-top:16px;">Yükleniyor...</p>
  <p *ngIf="error" style="color:red; margin-top:16px;">{{ error }}</p>

  <table mat-table
         [dataSource]="iletisimler"
         multiTemplateDataRows
         class="mat-elevation-z2"
         style="margin-top:16px; width:100%;">

    <ng-container matColumnDef="musteri">
      <th mat-header-cell *matHeaderCellDef>Müşteri</th>
      <td mat-cell *matCellDef="let i">{{ i.musteri }}</td>
    </ng-container>

    <ng-container matColumnDef="notBtn">
      <th mat-header-cell *matHeaderCellDef>Detay</th>
      <td mat-cell *matCellDef="let i">
        <button mat-stroked-button color="primary" (click)="notAcKapat(i)">
          {{ expandedElement === i ? 'Kapat' : 'Detay' }}
        </button>
      </td>
    </ng-container>

    <ng-container matColumnDef="tarih">
      <th mat-header-cell *matHeaderCellDef>Ekleyen ve Tarih</th>
      <td mat-cell *matCellDef="let i">
        {{ i.islemYapan }} - {{ i.tarih | date:'dd.MM.yyyy HH:mm' }}
      </td>
    </ng-container>

    <ng-container matColumnDef="islem">
      <th mat-header-cell *matHeaderCellDef>İşlem</th>
      <td mat-cell *matCellDef="let i">
        <button mat-stroked-button color="primary"
                (click)="musteriyeGit(i.musteriId)">
          Müşteri
        </button>

        <button mat-stroked-button color="primary"
                (click)="islemGecmisiDialogAc(i)">
          İşlem Geçmişi
        </button>
      </td>
    </ng-container>

    <!-- EXPANDED -->
    <ng-container matColumnDef="expandedDetail">
  <td mat-cell *matCellDef="let i"
      [attr.colspan]="displayedColumns.length">

    <div *ngIf="expandedElement === i">

      <!-- JSON alanlar -->
      <div *ngFor="let key of objectKeys(i.alanlar)">
        <strong>{{ dropdownMap[key] || key }}:</strong> {{ i.alanlar[key] }}
      </div>

      <hr>

      <!-- iletişim not -->
      <div>
        <strong>Not:</strong> {{ i.not || '-' }}
      </div>

      <hr>

      <!-- ⭐ işlem ekleme -->
      <mat-form-field appearance="outline" style="width:100%; margin-top:8px;">
        <mat-label>Yeni işlem notu</mat-label>
        <textarea matInput
                  [(ngModel)]="yeniIslemNot[i.id]"
                  rows="2">
        </textarea>
      </mat-form-field>

      <button mat-raised-button
              color="primary"
              (click)="islemEkle(i)"
              [disabled]="!yeniIslemNot[i.id]">
        İşlem ekle
      </button>

    </div>

  </td>
</ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <tr mat-row *matRowDef="let row; columns: ['expandedDetail'];"></tr>

  </table>

  <div *ngIf="!loading && iletisimler.length > 0"
       style="margin-top:16px; display:flex; justify-content:center; gap:10px;">

    <button mat-stroked-button (click)="oncekiSayfa()" [disabled]="page === 1">
      ◀ Önceki
    </button>

    <span>Sayfa {{ page }} / {{ toplamSayfa }}</span>

    <button mat-stroked-button (click)="sonrakiSayfa()" [disabled]="page >= toplamSayfa">
      Sonraki ▶
    </button>

  </div>

</mat-card>
